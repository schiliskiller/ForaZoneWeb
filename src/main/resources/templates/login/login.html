<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>ForaZone - Iniciar sesion</title>
        <link rel="stylesheet" th:href="@{/bootstrap.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script th:src="@{/send_json.js}"></script>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Por favor ingrese sus credenciales</legend>
                <div>
                    <label for="nombreUsuario" class="form-label mt-4">Correo electrónico o nombre de usuario</label>
                    <input type="text" class="form-control" id="nombreUsuario" placeholder="abcdxyz@example.com">
                </div>
                <div>
                    <label for="contrasena" class="form-label mt-4">Contraseña</label>
                    <input type="password" class="form-control" id="contrasena" placeholder="********" autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary" th:onclick="sendLoginJsonData()">Submit</button>
            </fieldset>
        </form>
    </body>
</html>
