<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>ForaZone - Crear cuenta</title>
        <link rel="stylesheet" href="bootstrap.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <form>
            <legend>Por favor ingrese los siguientes datos</legend>
            <fieldset>
                <div>
                    <label for="correoCuentaNueva" class="form-label mt-4">Correo electrónico</label>
                    <input type="email" class="form-control"
                           id="correoCuentaNueva"
                           placeholder="abcdxyz@example.com"
                           th:field="*{usuarioDuenio.correoElectronico}">
                </div>
                <div>
                    <label for="correoVerificacion" class="form-label mt-4">Verificar correo electrónico</label>
                    <input type="email"
                           class="form-control"
                           id="correoVerificacion"
                           placeholder="abcdxyz@example.com">
                </div>
                <div>
                    <label for="contraCuentaNueva" class="form-label mt-4">Contraseña nueva</label>
                    <input type="password"
                           class="form-control"
                           id="contraCuentaNueva"
                           placeholder="********"
                           autocomplete="off"
                           th:field="*{usuarioDuenio.contrEncriptada}">
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">
                        Esta de acuerdo con nuestro <a href="#">aviso de privacidad</a>.
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">Submit</button>
            </fieldset>
        </form>
    </body>
</html>
